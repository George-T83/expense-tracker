<div class="container mt-4">
  <h2 class="text-center mb-4">All Expenses</h2>

  @if (expenseService.expenses().length === 0) {
    <div class="alert alert-info text-center shadow-sm">
      No expenses available. Please add a new expense.
    </div>
  } @else {
    <div class="row justify-content-center">
      <div class="col-md-8">
        @for (item of expenseService.expenses(); track item.id) {
          <app-expense-item [expense]="item"></app-expense-item>
        }
      </div>
    </div>
  }
</div>
