<div class="card shadow-sm mb-3">
  <div class="card-body d-flex justify-content-between align-items-center">
    <div>
      <h5 class="mb-1">{{ expense().title }}</h5>

      <small class="fw-semibold" [style.color]="getCategoryColor()">
        {{ expense().category }}
      </small>
    </div>

    <div class="text-end">
      <div class="fw-bold expense-amount" [class]="getAmountClass()">
        {{ expense().amount | currency }}
      </div>

      <div class="mt-2">
        <button class="btn btn-primary btn-sm m-2" [routerLink]="['/edit', expense().id]">
          Edit
        </button>

        <button
          class="btn btn-danger btn-sm m-2"
          (click)="expenseService.deleteExpense(expense().id)"
        >
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
