<div class="container mt-4 w-50">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="card-title mb-3 text-center">Edit Expense</h4>
      <p>The expense id is {{ expense()!.id }} and amount is {{ expense()!.amount | currency }}</p>
      @if (expense()) {
        <div class="mb-3">
          <label class="form-label">Expense Title</label>
          <input type="text" class="form-control" [(ngModel)]="expense()!.title" />
        </div>
        <div class="mb-3">
          <label class="form-label">Amount ($)</label>
          <input type="number" class="form-control" [(ngModel)]="expense()!.amount" />
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <select class="form-select" [(ngModel)]="expense()!.category">
            <option value="" disabled selected>Select category</option>
            @for (category of categories; track category) {
              <option [value]="category">{{ category }}</option>
            }
          </select>
        </div>
        <button class="btn btn-primary w-100" (click)="onUpdate()">Edit Expense</button>
      }
    </div>
  </div>
</div>
